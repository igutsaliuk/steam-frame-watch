name: Steam Frame Watch

# Triggered every 5 minutes by an external cron-job.org job (GitHub honors
# workflow_dispatch immediately, unlike the throttled `schedule` event). When
# Frame becomes available for ANYTHING (reservation or sale), it pushes a phone
# notification via ntfy.sh, then disables BOTH this workflow and the external
# cron-job.org trigger so everything stops cleanly.

on:
  schedule:
    - cron: "0 16 * * *"    # daily heartbeat only at 16:00 UTC (~9am PT)
  workflow_dispatch: {}      # primary trigger (fired by cron-job.org / manual)

permissions:
  actions: write             # needed so the job can disable this workflow
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Steam Frame availability
        id: check
        run: |
          set +e
          python3 steam_stock_watch.py frame -v
          echo "code=$?" >> "$GITHUB_OUTPUT"
          # 0 = available (reservation or sale), 2 = still notify-only, 1 = error

      - name: Push to phone + stop watching
        if: steps.check.outputs.code == '0'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
          CRONJOB_ID: ${{ vars.CRONJOB_ID }}
        run: |
          curl -fsS \
            -H "Title: Steam Frame is available!" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light,video_game" \
            -H "Click: https://store.steampowered.com/hardware/steamframe" \
            -d "Frame just left NOTIFY_ONLY — reserve/buy now: https://store.steampowered.com/hardware/steamframe" \
            "https://ntfy.sh/${NTFY_TOPIC}"

          # Stop further GitHub Actions runs.
          gh api --method PUT \
            "repos/${{ github.repository }}/actions/workflows/steam-frame-watch.yml/disable"

          # Disable the external cron-job.org trigger too, for a clean stop.
          if [ -n "${CRONJOB_API_KEY}" ] && [ -n "${CRONJOB_ID}" ]; then
            curl -fsS -X PATCH \
              -H "Authorization: Bearer ${CRONJOB_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"job":{"enabled":false}}' \
              "https://api.cron-job.org/jobs/${CRONJOB_ID}"
          fi

      - name: Daily heartbeat (still watching, nothing yet)
        if: steps.check.outputs.code != '0' && github.event.schedule == '0 16 * * *'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          curl -fsS \
            -H "Title: Still watching Steam Frame" \
            -H "Priority: low" \
            -H "Tags: eyes" \
            -d "Heartbeat: still NOTIFY_ONLY, nothing yet. Checking every 5 min." \
            "https://ntfy.sh/${NTFY_TOPIC}"
